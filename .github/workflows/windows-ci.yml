name: Windows CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  wpf-sample-regressions:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.200

      - name: Prepare Local Package Feed
        run: New-Item -ItemType Directory -Force -Path artifacts/local-packages | Out-Null

      - name: Run WPF Sample Regression Tests
        run: >
          dotnet test tests/Wxsg.Tests/Wxsg.Tests.csproj
          --nologo
          -m:1
          /nodeReuse:false
          --disable-build-servers
          --filter "FullyQualifiedName~WpfSampleRegressionTests"
